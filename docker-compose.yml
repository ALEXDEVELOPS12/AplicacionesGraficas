version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: nicaplex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nicaplex
      POSTGRES_USER: nicaplex_user
      POSTGRES_PASSWORD: nicaplex_pass
    ports:
      - "5433:5432"
    volumes:
      - nicaplex_data:/var/lib/postgresql/data

volumes:
  nicaplex_data:
